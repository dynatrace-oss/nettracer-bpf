name: "Main push release"
# The workflow publishes Release with a new patch version with every main branch push

on:
  push:
    branches:
      - main

jobs:
  main-create-timestamp-and-tag:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout source code of the repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Set Git identity"
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: "Create a new tag"
        run: |
          currentTag=$(git describe --abbrev=0 --tags)
          newTag=$( echo $currentTag | sed -E  's/([0-9]+.[0-9]+.)([0-9]+)/echo "\1$((\2+1))"/e')
          git tag -a $newTag -m "Main push tagging with $newTag"
          echo "Current tag value: $currentTagValue New tag value: $newTag"
          git push origin $newTag

